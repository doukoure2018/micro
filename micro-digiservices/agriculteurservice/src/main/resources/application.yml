spring:
  application:
    name: agriculteurservice
  profiles:
    active: default
  main:
    allow-bean-definition-overriding: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
      indent-output: true
    deserialization:
      fail-on-unknown-properties: false
    date-format: yyyy-MM-dd'T'HH:mm:ss.SSS
    time-zone: UTC

# Pas de section datasource : agriculteurservice n'a PAS de base propre,
# il consomme uniquement ebanking via Feign.

server:
  port: 8088

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://admin:admin2711@localhost:5002/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

# Cle API PUBLIQUE : protege /agriculteurs/** (KUMY -> agriculteurservice)
agripilot:
  public-api-key: ${AGRIPILOT_PUBLIC_API_KEY:}

# Cle API INTERNE : pour appeler le perimetre agricole d'ebanking (agriculteurservice -> ebanking)
ebanking:
  agri:
    api-key: ${EBANKING_AGRI_API_KEY:}

feign:
  client:
    config:
      default:
        connectTimeout: 30000
        readTimeout: 120000

logging:
  level:
    io.digiservices.agriculteurservice: DEBUG
