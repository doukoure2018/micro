name: CD - Deploy Microservices to OVH

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - micro-digiservices/**
      - docker-compose.yml
      - .env.prod
      - '!micro-digiservices/frontend/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17.2
        env:
          POSTGRES_USER: user2711
          POSTGRES_PASSWORD: admin2711
          POSTGRES_DATABASE: localdb
        ports:
          - 5432:5432
        options:
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Notify deployment start
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          # Escape special characters for JSON
          SAFE_MSG=$(echo "$COMMIT_MSG" | head -1 | tr -d '"\\' | cut -c1-200)
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\":rocket: Microservices deployment to OVH started\nCommit: https://github.com/${{ github.repository }}/commit/${{ github.sha }}\nMessage: ${SAFE_MSG}\"}" \
            "$SLACK_WEBHOOK_URL"

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}
       # ADD THIS NEW STEP HERE
      - name: Configure Maven settings for Docker Hub
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << EOF
          <settings>
            <servers>
              <server>
                <id>registry-1.docker.io</id>
                <username>${{ secrets.DOCKERHUB_USERNAME }}</username>
                <password>${{ secrets.DOCKERHUB_ACCESS_TOKEN }}</password>
              </server>
              <server>
                <id>registry.hub.docker.com</id>
                <username>${{ secrets.DOCKERHUB_USERNAME }}</username>
                  <password>${{ secrets.DOCKERHUB_ACCESS_TOKEN }}</password>
                </server>
              </servers>
          </settings>
          EOF

      - name: Generate build tag
        id: build-number
        run: echo "BUILD_NUMBER=$(date '+%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      # Build and push each microservice with Maven/Jib
      - name: Install all modules (including clients)
        working-directory: ./micro-digiservices
        run: mvn -ntp -B install -DskipTests

      - name: Build and push Discovery Server
        working-directory: ./micro-digiservices/discoveryserver
        run: |
          mvn -ntp -B verify -DskipTests jib:dockerBuild
          docker tag doukoure93/discoveryserver:0.0.1-SNAPSHOT doukoure93/discoveryserver:${{ steps.build-number.outputs.BUILD_NUMBER }}
          docker tag doukoure93/discoveryserver:0.0.1-SNAPSHOT doukoure93/discoveryserver:latest
          docker push doukoure93/discoveryserver:${{ steps.build-number.outputs.BUILD_NUMBER }}
          docker push doukoure93/discoveryserver:latest

      - name: Build and push Gateway
        working-directory: ./micro-digiservices/gateway
        run: |
          mvn -ntp -B verify -DskipTests jib:dockerBuild
          docker tag doukoure93/gateway:0.0.1-SNAPSHOT doukoure93/gateway:${{ steps.build-number.outputs.BUILD_NUMBER }}
          docker tag doukoure93/gateway:0.0.1-SNAPSHOT doukoure93/gateway:latest
          docker push doukoure93/gateway:${{ steps.build-number.outputs.BUILD_NUMBER }}
          docker push doukoure93/gateway:latest

      - name: Build and push Authorization Server
        working-directory: ./micro-digiservices/authorizationserver
        run: |
          mvn -ntp -B verify -DskipTests jib:dockerBuild
          docker tag doukoure93/authorizationserver:0.0.1-SNAPSHOT doukoure93/authorizationserver:${{ steps.build-number.outputs.BUILD_NUMBER }}
          docker tag doukoure93/authorizationserver:0.0.1-SNAPSHOT doukoure93/authorizationserver:latest
          docker push doukoure93/authorizationserver:${{ steps.build-number.outputs.BUILD_NUMBER }}
          docker push doukoure93/authorizationserver:latest

      - name: Build and push User Service
        working-directory: ./micro-digiservices/userservice
        run: |
          mvn -ntp -B verify -DskipTests jib:dockerBuild
          docker tag doukoure93/userservice:0.0.1-SNAPSHOT doukoure93/userservice:${{ steps.build-number.outputs.BUILD_NUMBER }}
          docker tag doukoure93/userservice:0.0.1-SNAPSHOT doukoure93/userservice:latest
          docker push doukoure93/userservice:${{ steps.build-number.outputs.BUILD_NUMBER }}
          docker push doukoure93/userservice:latest

      - name: Build and push E-Credit Service
        working-directory: ./micro-digiservices
        run: |
          mvn -ntp -B install -DskipTests -pl clients
          cd ecreditservice
          mvn -ntp -B verify -DskipTests jib:dockerBuild
          docker tag doukoure93/ecreditservice:0.0.1-SNAPSHOT doukoure93/ecreditservice:${{ steps.build-number.outputs.BUILD_NUMBER }}
          docker tag doukoure93/ecreditservice:0.0.1-SNAPSHOT doukoure93/ecreditservice:latest
          docker push doukoure93/ecreditservice:${{ steps.build-number.outputs.BUILD_NUMBER }}
          docker push doukoure93/ecreditservice:latest

      - name: Build and push E-Banking Service
        working-directory: ./micro-digiservices/ebanking
        run: |
          mvn -ntp -B verify -DskipTests jib:dockerBuild
          docker tag doukoure93/ebanking:0.0.1-SNAPSHOT doukoure93/ebanking:${{ steps.build-number.outputs.BUILD_NUMBER }}
          docker tag doukoure93/ebanking:0.0.1-SNAPSHOT doukoure93/ebanking:latest
          docker push doukoure93/ebanking:${{ steps.build-number.outputs.BUILD_NUMBER }}
          docker push doukoure93/ebanking:latest

      - name: Build and push Notification Service
        working-directory: ./micro-digiservices/notificationservice
        run: |
          mvn -ntp -B verify -DskipTests jib:dockerBuild
          docker tag doukoure93/notificationservice:0.0.1-SNAPSHOT doukoure93/notificationservice:${{ steps.build-number.outputs.BUILD_NUMBER }}
          docker tag doukoure93/notificationservice:0.0.1-SNAPSHOT doukoure93/notificationservice:latest
          docker push doukoure93/notificationservice:${{ steps.build-number.outputs.BUILD_NUMBER }}
          docker push doukoure93/notificationservice:latest

      - name: Build and push Agriculteur Service
        working-directory: ./micro-digiservices/agriculteurservice
        run: |
          mvn -ntp -B verify -DskipTests jib:dockerBuild
          docker tag doukoure93/agriculteurservice:0.0.1-SNAPSHOT doukoure93/agriculteurservice:${{ steps.build-number.outputs.BUILD_NUMBER }}
          docker tag doukoure93/agriculteurservice:0.0.1-SNAPSHOT doukoure93/agriculteurservice:latest
          docker push doukoure93/agriculteurservice:${{ steps.build-number.outputs.BUILD_NUMBER }}
          docker push doukoure93/agriculteurservice:latest


      - name: Notify images pushed
        run: >
          curl -X POST -H 'Content-type: application/json'
          --data '{"text":":whale: All microservices images pushed to DockerHub!\nTag: ${{ steps.build-number.outputs.BUILD_NUMBER }}"}'
          ${{ secrets.SLACK_WEBHOOK_URL }}

      # Deploy to OVH server - Version optimisée
      - name: Deploy to OVH server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OVH_HOST }}
          username: ${{ secrets.OVH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e

            cd ~/microservices || { mkdir -p ~/microservices && cd ~/microservices; }

            # Sync repository
            if [ -d ".git" ]; then
              echo "📥 Syncing with repository..."
              git stash save "Auto-stash before deployment $(date)" || true
              git fetch origin main
              git reset --hard origin/main
              echo "✅ Repository synchronized"
            else
              echo "📥 Cloning repository..."
              git clone https://github.com/${{ github.repository }} .
              git checkout main
            fi

            # Create directories
            echo "📁 Creating required directories..."
            mkdir -p logs/{discoveryserver,gateway,authorizationserver,userservice,ecreditservice,ebankingservice,notificationservice,frontend}
            mkdir -p keys

            # Check .env.prod
            if [ ! -f .env.prod ]; then
              echo "⚠️ .env.prod not found, using .env.docker as template..."
              cp .env.docker .env.prod || { echo "❌ No .env.docker found!"; exit 1; }
            fi

            # Load only DB variables needed by the script (docker-compose reads .env.prod directly)
            # tr -d '\r' strips Windows line endings that would corrupt the values
            export POSTGRES_USER=$(grep '^POSTGRES_USER=' .env.prod | cut -d'=' -f2 | tr -d '\r\n ')
            export POSTGRES_DB=$(grep '^POSTGRES_DB=' .env.prod | cut -d'=' -f2 | tr -d '\r\n ')
            export POSTGRES_PASSWORD=$(grep '^POSTGRES_PASSWORD=' .env.prod | cut -d'=' -f2 | tr -d '\r\n ')

            # === GARDE-FOUS PRE-DEPLOIEMENT ===
            echo "🛡️ Pre-deployment safety checks..."

            # 1. Vérifier que le volume postgres existe (sinon DB perdue!)
            # Skip if first deployment (volume will be created by docker compose with external: true if missing)
            if sudo docker ps -a | grep -q postgrecontainer; then
              if ! sudo docker volume inspect microservices_postgres_data_v16 >/dev/null 2>&1; then
                echo "❌ FATAL: Volume 'microservices_postgres_data_v16' does not exist!"
                echo "   Deploying now would create an EMPTY database."
                echo "   Aborting to protect your data."
                exit 1
              fi
              echo "✅ Postgres volume exists"
            else
              echo "ℹ️ First deployment detected (no postgres container yet)"
            fi

            # 2. Vérifier que docker-compose.yml protège bien le volume
            if ! grep -A 4 "^volumes:" docker-compose.yml | grep -q "external: true"; then
              echo "❌ FATAL: docker-compose.yml is missing 'external: true' on postgres volume!"
              echo "   This would cause Docker to create a NEW empty volume."
              echo "   Aborting deployment."
              exit 1
            fi
            echo "✅ docker-compose.yml volume config is safe"

            # 3. Backup VÉRIFIÉ (>1MB minimum)
            mkdir -p ~/backups_pre_deploy
            if sudo docker ps | grep -q postgrecontainer; then
              BACKUP_FILE=~/backups_pre_deploy/backup_pre_deploy_$(date +%Y%m%d_%H%M%S).dump
              echo "📦 Creating verified pre-deployment backup..."
              if sudo docker exec postgrecontainer pg_dump -U "${POSTGRES_USER:-user2711}" -d "${POSTGRES_DB:-localdb}" -Fc -Z 9 > "$BACKUP_FILE" 2>/tmp/pg_dump.err; then
                BACKUP_SIZE=$(stat -c%s "$BACKUP_FILE" 2>/dev/null || echo 0)
                if [ "$BACKUP_SIZE" -lt 1048576 ]; then
                  echo "❌ FATAL: Backup is too small ($BACKUP_SIZE bytes < 1MB). pg_dump probably failed."
                  echo "   pg_dump errors:"
                  cat /tmp/pg_dump.err
                  rm -f "$BACKUP_FILE"
                  exit 1
                fi
                echo "✅ Backup created ($(du -h "$BACKUP_FILE" | cut -f1)): $BACKUP_FILE"
              else
                echo "❌ FATAL: pg_dump command failed"
                cat /tmp/pg_dump.err
                rm -f "$BACKUP_FILE"
                exit 1
              fi
              # Rotation: garder 14 jours
              find ~/backups_pre_deploy -name "backup_pre_deploy_*.dump" -mtime +14 -delete 2>/dev/null || true
            else
              echo "ℹ️ PostgreSQL not running, skipping backup (first deployment?)"
            fi

            # === FIN GARDE-FOUS ===

            # Stop only services managed by this docker-compose (preserves other docker apps)
            echo "🛑 Stopping services managed by docker-compose..."
            sudo docker compose --env-file .env.prod down --remove-orphans || true
            sudo docker network prune -f

            # Pull images
            echo "📥 Pulling all latest images..."
            sudo docker compose --env-file .env.prod pull

            # Clean old images
            sudo docker image prune -f

            # Start PostgreSQL with better error handling
            echo "🏗️ Starting PostgreSQL..."
            sudo docker compose --env-file .env.prod up -d postgresdb

            # Give PostgreSQL more time to initialize
            echo "⏳ Waiting for PostgreSQL to initialize (10 seconds)..."
            sleep 10

            # Check if PostgreSQL container is running
            if ! sudo docker ps | grep -q postgrecontainer; then
              echo "❌ PostgreSQL container failed to start. Checking logs..."
              sudo docker logs postgrecontainer --tail=20
              echo "Attempting to restart PostgreSQL..."
              sudo docker compose --env-file .env.prod restart postgresdb
              sleep 10
            fi

            # Wait for PostgreSQL with better error handling
            echo "⏳ Waiting for PostgreSQL to be ready..."
            count=0
            until sudo docker exec postgrecontainer pg_isready -U ${POSTGRES_USER:-user2711} 2>/dev/null; do
              if [ $count -eq 40 ]; then
                echo "❌ PostgreSQL failed to become ready!"
                echo "Container status:"
                sudo docker ps -a | grep postgres
                echo "Last logs:"
                sudo docker logs postgrecontainer --tail=30
                exit 1
              fi
              echo "Waiting for PostgreSQL... ($count/40)"
              sleep 3
              count=$((count + 1))
            done
            echo "✅ PostgreSQL is ready"

            # Start Kafka and Zookeeper
            echo "🏗️ Starting Kafka and Zookeeper..."
            sudo docker compose --env-file .env.prod up -d zookeeper kafka
            sleep 10

            # Run migrations
            echo "🗄️ Running database migrations..."
            MIGRATION_COUNT=$(ls micro-digiservices/database-migrations/src/main/resources/db/migration/*.sql 2>/dev/null | wc -l)

            if [ "$MIGRATION_COUNT" -gt 0 ]; then
              NETWORK_NAME=$(sudo docker network ls --filter name=microservices --format "{{.Name}}" | head -1)
              sudo docker run --rm \
                --network ${NETWORK_NAME:-bridge} \
                -v "$(pwd)/micro-digiservices/database-migrations/src/main/resources/db/migration:/flyway/sql:ro" \
                -e FLYWAY_URL="jdbc:postgresql://postgrecontainer:5432/${POSTGRES_DB:-localdb}" \
                -e FLYWAY_USER="${POSTGRES_USER:-user2711}" \
                -e FLYWAY_PASSWORD="${POSTGRES_PASSWORD:-admin2711}" \
                -e FLYWAY_BASELINE_ON_MIGRATE="true" \
                -e FLYWAY_OUT_OF_ORDER="true" \
                flyway/flyway:11.3.0 migrate || echo "⚠️ Migration warnings"
            fi

            # Start services in order
            echo "🔍 Starting Discovery Server..."
            sudo docker compose --env-file .env.prod up -d discoveryserver
            sleep 30

            echo "🔐 Starting Gateway and Authorization Server..."
            sudo docker compose --env-file .env.prod up -d gateway authorizationserver
            sleep 20

            echo "🚀 Starting all remaining services..."
            sudo docker compose --env-file .env.prod up -d

            echo "⏳ Waiting for services to stabilize..."
            sleep 60

            # Check services
            echo "🏥 Checking services health..."
            services=("postgrecontainer" "kafka" "discoveryserver" "gateway" "authorizationserver" "userservice" "ecreditservice" "ebankingservice" "notificationservice")
            all_healthy=true

            for service in "${services[@]}"; do
              if sudo docker ps | grep -q "$service"; then
                echo "✅ $service is running"
              else
                echo "❌ $service is not running"
                all_healthy=false
              fi
            done

            if [ "$all_healthy" = false ]; then
              echo "⚠️ Some services failed. Checking logs..."
              for service in "${services[@]}"; do
                if ! sudo docker ps | grep -q "$service"; then
                  echo "Logs for $service:"
                  sudo docker logs "$service" --tail=10 2>&1 || echo "No logs available"
                fi
              done
              exit 1
            fi

            echo ""
            echo "🌐 Deployment successful!"
            echo "================================================"
            echo "Services available at:"
            echo "   • Frontend: https://digi-creditrural-io.com"
            echo "================================================"

      - name: Final success notification
        run: >
          curl -X POST -H 'Content-type: application/json'
          --data '{"text":":white_check_mark: Microservices deployment to OVH complete!\n:globe_with_meridians: Services:\n• Gateway: http://${{ secrets.OVH_HOST }}:8000\n• Discovery: http://${{ secrets.OVH_HOST }}:5002\n• Auth Server: http://${{ secrets.OVH_HOST }}:8080\n• Frontend: http://${{ secrets.OVH_HOST }}:4200\n:rocket: Build tag: ${{ steps.build-number.outputs.BUILD_NUMBER }}"}'
          ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Error notification
        if: failure()
        run: >
          curl -X POST -H 'Content-type: application/json'
          --data '{"text":":rotating_light: OVH microservices deployment failed!\n:stopwatch: Status: ${{ job.status }}\n:link: Check logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'
          ${{ secrets.SLACK_WEBHOOK_URL }}